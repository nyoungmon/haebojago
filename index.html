<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>해보자고</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#181818;--l1:#202020;--l2:#282828;--l3:#323232;
      --gold:#c9a84c;--gold-dim:rgba(201,168,76,0.08);
      --cig:#2563a8;--cig-light:#4a90d9;--cig-dim:rgba(37,99,168,0.12);
      --trad:#7b4a1e;--trad-light:#a0622a;--trad-dim:rgba(123,74,30,0.12);
      --text:#efefef;--text-sec:#aaaaaa;--text-muted:#606060;
      --div:rgba(255,255,255,0.06);
      --fd:'DM Sans',sans-serif;--fp:'Pretendard',-apple-system,sans-serif;
    }
    html,body{background:var(--bg);color:var(--text);font-family:var(--fp);min-height:100vh;-webkit-font-smoothing:antialiased}
    .page{display:none;max-width:430px;margin:0 auto;padding:2rem 1.25rem 7rem}
    .page.active{display:block;animation:fi .22s ease}
    @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(24,24,24,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--div);display:flex;justify-content:center;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .nb{flex:1;max-width:120px;padding:12px 8px 14px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--text-muted);font-family:var(--fp);transition:color .2s}
    .nb .ni{font-size:20px;transition:transform .2s}
    .nb .nl{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
    .nb.active{color:var(--gold)}
    .nb.active .ni{transform:scale(1.12)}
    .hdr{margin-bottom:2rem}
    .eyebrow{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:.6rem}
    .eyebrow::before{content:'';width:18px;height:1px;background:var(--gold)}
    .hdr h1{font-family:var(--fd);font-size:34px;font-weight:300;color:var(--text);letter-spacing:-.03em;line-height:1.05}
    .hdr h1 b{font-weight:600}
    .slbl{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.9rem;display:flex;align-items:center;gap:8px}
    .slbl::after{content:'';flex:1;height:1px;background:var(--div)}
    .today-txt{font-size:13px;color:var(--text-muted);margin-bottom:1.6rem;letter-spacing:.01em}
    .card{background:var(--l1);border-radius:14px;padding:1.4rem;margin-bottom:12px;border:1px solid var(--div)}
    .fld{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    .fld label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
    .finput{width:100%;height:46px;padding:0 14px;background:var(--l2);border:1px solid var(--div);border-radius:10px;color:var(--text);font-family:var(--fp);font-size:15px;font-weight:500;transition:border-color .2s;-webkit-appearance:none;color-scheme:dark}
    .finput:focus{outline:none;border-color:var(--gold)}
    .finput::placeholder{color:var(--text-muted)}
    .tbtn{width:100%;height:42px;background:transparent;border:1px solid var(--div);border-radius:10px;color:var(--text-muted);font-family:var(--fp);font-size:12px;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:all .2s;margin-bottom:14px}
    .tbtn:hover{border-color:var(--gold);color:var(--gold)}
    .trow{display:flex;gap:8px;margin-bottom:16px}
    .tbtn2{flex:1;padding:14px 10px;border-radius:10px;border:1px solid var(--div);background:var(--l2);color:var(--text-muted);font-family:var(--fp);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
    .tbtn2 .ico{font-size:22px}
    .tbtn2 .lbl{font-size:11px;letter-spacing:.03em}
    .tbtn2.ac{border-color:var(--cig-light);background:var(--cig-dim);color:var(--cig-light)}
    .tbtn2.at{border-color:var(--trad-light);background:var(--trad-dim);color:var(--trad-light)}
    .csec{margin-bottom:18px}
    .clbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);text-align:center;margin-bottom:12px}
    .cwrap{display:flex;align-items:center;justify-content:center;gap:12px}
    .step{width:44px;height:44px;border-radius:50%;border:1px solid var(--div);background:var(--l2);color:var(--text-sec);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;user-select:none}
    .step:hover{border-color:var(--gold);color:var(--gold)}
    .step:active{transform:scale(.9)}
    .cval{width:72px;height:44px;text-align:center;background:var(--l2);border:1px solid var(--div);border-radius:10px;color:var(--text);font-family:var(--fd);font-size:24px;font-weight:500;color-scheme:dark}
    .cval:focus{outline:none;border-color:var(--gold)}
    .cunit{font-size:13px;color:var(--text-muted);font-weight:500}
    .rbtn{width:100%;padding:15px;border-radius:10px;border:none;font-family:var(--fp);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;color:#fff;letter-spacing:.02em}
    .rbtn.cig{background:var(--cig)}
    .rbtn.cig:hover{background:var(--cig-light)}
    .rbtn.trad{background:var(--trad)}
    .rbtn.trad:hover{background:var(--trad-light)}
    .rbtn:active{transform:scale(.98);opacity:.9}
    .calhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
    .calnav{width:34px;height:34px;border-radius:50%;background:var(--l2);border:1px solid var(--div);color:var(--text-sec);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .calnav:hover{border-color:var(--gold);color:var(--gold)}
    .calmon{font-family:var(--fd);font-size:16px;font-weight:500;color:var(--text);letter-spacing:-.01em}
    .caldow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
    .caldow span{text-align:center;font-size:9px;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;padding:4px 0}
    .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .calday{min-height:50px;border-radius:8px;border:1px solid transparent;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px 2px;transition:all .15s}
    .calday:hover{background:var(--l2)}
    .calday.today{border-color:var(--gold)!important;background:var(--gold-dim)}
    .calday.other .cdn{opacity:.2}
    .cdn{font-size:11px;font-weight:500;color:var(--text-sec)}
    .calday.today .cdn{color:var(--gold);font-weight:700}
    .badges{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
    .badge{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;line-height:1.6}
    .badge.cig{background:var(--cig-dim);color:var(--cig-light)}
    .badge.trad{background:var(--trad-dim);color:var(--trad-light)}
    .detail{display:none;margin-top:12px;background:var(--l2);border-radius:10px;padding:1rem;border:1px solid var(--div)}
    .detail.open{display:block}
    .dethdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
    .detdate{font-size:13px;font-weight:600;color:var(--text)}
    .detclose{width:24px;height:24px;border-radius:50%;background:var(--l3);border:none;color:var(--text-muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:color .15s}
    .detclose:hover{color:var(--text)}
    .detlist{display:flex;flex-direction:column;gap:6px}
    .detitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px}
    .detitem.cig{background:var(--cig-dim)}
    .detitem.trad{background:var(--trad-dim)}
    .dtype{font-size:12px;font-weight:600;flex:1}
    .detitem.cig .dtype{color:var(--cig-light)}
    .detitem.trad .dtype{color:var(--trad-light)}
    .dcnt{font-size:13px;font-weight:700;color:var(--text-sec)}
    .ddel{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;opacity:.45;transition:opacity .15s}
    .ddel:hover{opacity:1;color:#e05555}
    .detempty{font-size:12px;color:var(--text-muted);padding:.2rem 0}
    .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .sc{background:var(--l1);border-radius:12px;padding:1.1rem;border:1px solid var(--div)}
    .sclbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
    .scval{font-family:var(--fd);font-size:26px;font-weight:400;color:var(--text);letter-spacing:-.02em;line-height:1}
    .scsub{font-size:11px;color:var(--text-muted);margin-top:5px}
    .sdual{display:flex;gap:6px;align-items:baseline;flex-wrap:wrap}
    .sdual .num{font-family:var(--fd);font-size:22px;font-weight:400;letter-spacing:-.02em}
    .sdual .num.c{color:var(--cig-light)}
    .sdual .num.t{color:var(--trad-light)}
    .sdual .unit{font-size:10px;color:var(--text-muted)}
    .brow{display:flex;gap:8px;margin-bottom:12px}
    .bbtn{flex:1;padding:12px 10px;border-radius:10px;border:1px solid var(--div);background:var(--l2);color:var(--text-muted);font-family:var(--fp);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
    .costbtn{width:100%;padding:15px;border-radius:10px;border:none;font-family:var(--fp);font-size:14px;font-weight:700;cursor:pointer;background:#fff;color:#1a1a1a;transition:all .2s}
    .costbtn:hover{background:#f0f0f0}
    .costbtn:active{transform:scale(.98)}
    .costi{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--div)}
    .costi:last-child{border-bottom:none}
    .costi-date{font-size:12px;color:var(--text-muted);margin-bottom:3px}
    .costi-brand{font-size:11px;font-weight:600}
    .costi-amt{font-family:var(--fd);font-size:15px;font-weight:400;color:var(--text);text-align:right}
    .costi-packs{font-size:11px;color:var(--text-muted);margin-top:1px;text-align:right}
    .costdel{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;opacity:.4;transition:opacity .15s;margin-left:10px}
    .costdel:hover{opacity:1;color:#e05555}
    .toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--l3);border:1px solid var(--div);color:var(--text);font-size:13px;font-weight:500;padding:10px 20px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:99}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div class="page active" id="page-record">
  <div class="hdr">
    <div class="eyebrow">말보루 탈출</div>
    <h1><b>해보자고</b></h1>
  </div>
  <div class="today-txt" id="today-label"></div>
  <div class="slbl">🚬 흡연 기록</div>
  <div class="card">
    <div class="fld"><label>날짜</label><input class="finput" type="date" id="input-date"/></div>
    <button class="tbtn" onclick="setNow()">⏱ 오늘 날짜로 채우기</button>
    <div class="trow">
      <button class="tbtn2 ac" id="btn-cig" onclick="selectType('cig')"><span class="ico">🔵</span><span class="lbl">테리아</span></button>
      <button class="tbtn2" id="btn-trad" onclick="selectType('trad')"><span class="ico">🟤</span><span class="lbl">말보루</span></button>
    </div>
    <div class="csec">
      <div class="clbl">개비 수</div>
      <div class="cwrap">
        <button class="step" onclick="stepCount(-1)">−</button>
        <input class="cval" type="number" id="count-input" min="1" max="99" value="1" oninput="onCountInput(this)"/>
        <button class="step" onclick="stepCount(1)">+</button>
        <span class="cunit">개비</span>
      </div>
    </div>
    <button class="rbtn cig" id="add-btn" onclick="addEntry()">테리아 1개비 기록</button>
  </div>

  <!-- 데이터 백업 -->
  <div class="slbl" style="margin-top:1.2rem">🗄️ 데이터 백업</div>
  <div class="card" style="border-left:2px solid var(--text-muted)">
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:1rem;line-height:1.7">폰 교체나 브라우저 초기화 전에 데이터를 저장해두세요.</div>
    <div style="display:flex;gap:8px">
      <button class="tbtn" style="margin-bottom:0;flex:1" onclick="exportData()">⬇️ 내보내기</button>
      <button class="tbtn" style="margin-bottom:0;flex:1" onclick="document.getElementById('import-file').click()">⬆️ 가져오기</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)"/>
    </div>
  </div>
</div>

<div class="page" id="page-cost-record">
  <div class="hdr">
    <div class="eyebrow">이번 달 지출</div>
    <h1><b>비용 기록</b></h1>
  </div>
  <div class="slbl">💰 비용 기록</div>
  <div class="card">
    <div class="fld"><label>날짜</label><input class="finput" type="date" id="cost-date"/></div>
    <button class="tbtn" onclick="setCostDateNow()" style="margin-bottom:12px">⏱ 오늘 날짜로 채우기</button>
    <div class="fld" style="margin-bottom:12px">
      <label>종류</label>
      <div class="brow" style="margin-bottom:0">
        <button class="bbtn" id="brand-terea" onclick="selectBrand('테리아')">🔵 테리아</button>
        <button class="bbtn" id="brand-marlboro" onclick="selectBrand('말보루')">🟤 말보루</button>
      </div>
    </div>
    <div class="fld"><label>금액 (원)</label><input class="finput" type="number" id="cost-amount" placeholder="예: 6500" inputmode="numeric"/></div>
    <button class="costbtn" onclick="addCost()" style="margin-top:4px">💰 비용 기록</button>
  </div>
</div>

<div class="page" id="page-calendar">
  <div class="hdr">
    <div class="eyebrow">월별 기록 보기</div>
    <h1><b>얼마나 폈나</b></h1>
  </div>
  <div class="card">
    <div class="calhdr">
      <button class="calnav" onclick="changeMonth(-1)">‹</button>
      <span class="calmon" id="cal-month-label"></span>
      <button class="calnav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="caldow"><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span><span>일</span></div>
    <div class="calgrid" id="cal-grid"></div>
    <div class="detail" id="detail-panel">
      <div class="dethdr"><span class="detdate" id="detail-date-label"></span><button class="detclose" onclick="closeDetail()">✕</button></div>
      <div class="detlist" id="detail-list"></div>
    </div>
  </div>
  <div class="slbl">🚬 흡연 통계</div>
  <div class="sgrid">
    <div class="sc"><div class="sclbl">월 총합</div><div class="sdual"><span class="num c" id="s-month-cig">0</span><span class="unit">테리아</span><span class="num t" id="s-month-trad">0</span><span class="unit">말보루</span></div><div class="scsub">개비</div></div>
    <div class="sc"><div class="sclbl">오늘</div><div class="sdual"><span class="num c" id="s-today-cig">0</span><span class="unit">테리아</span><span class="num t" id="s-today-trad">0</span><span class="unit">말보루</span></div><div class="scsub">개비</div></div>
    <div class="sc" style="grid-column:span 2"><div class="sclbl">이번 달 최다 흡연일</div><div class="scval" id="s-max-date" style="font-size:18px">-</div><div class="scsub" id="s-max-sub"></div></div>
  </div>
</div>

<div class="page" id="page-cost">
  <div class="hdr">
    <div class="eyebrow">월별 지출 보기</div>
    <h1><b>담배값</b></h1>
  </div>
  <div class="card">
    <div class="calhdr">
      <button class="calnav" onclick="changeCostMonth(-1)">‹</button>
      <span class="calmon" id="cost-cal-month-label"></span>
      <button class="calnav" onclick="changeCostMonth(1)">›</button>
    </div>
    <div class="caldow"><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span><span>일</span></div>
    <div class="calgrid" id="cost-cal-grid"></div>
    <div class="detail" id="cost-detail-panel">
      <div class="dethdr"><span class="detdate" id="cost-detail-date-label"></span><button class="detclose" onclick="closeCostDetail()">✕</button></div>
      <div class="detlist" id="cost-detail-list"></div>
    </div>
  </div>
  <div class="slbl">💰 비용 통계</div>
  <div class="sgrid" style="margin-bottom:12px">
    <div class="sc"><div class="sclbl">테리아</div><div class="scval" id="cost-terea-total" style="color:var(--cig-light);font-size:16px">0원</div><div class="scsub">이번 달</div></div>
    <div class="sc"><div class="sclbl">말보루</div><div class="scval" id="cost-marlboro-total" style="color:var(--trad-light);font-size:16px">0원</div><div class="scsub">이번 달</div></div>
    <div class="sc" style="grid-column:span 2"><div class="sclbl">월 총합</div><div class="scval" id="cost-month-total" style="font-size:20px">0원</div><div class="scsub">지출</div></div>
  </div>
</div>

<nav class="nav">
  <button class="nb active" id="nav-record" onclick="goPage('record')"><span class="ni">🚬</span><span class="nl">흡연</span></button>
  <button class="nb" id="nav-cost-record" onclick="goPage('cost-record')"><span class="ni">💰</span><span class="nl">비용</span></button>
  <button class="nb" id="nav-calendar" onclick="goPage('calendar')"><span class="ni">📅</span><span class="nl">흡연 통계</span></button>
  <button class="nb" id="nav-cost" onclick="goPage('cost')"><span class="ni">💸</span><span class="nl">비용 통계</span></button>
</nav>
<div class="toast" id="toast"></div>

<script>
const SK='cig_v3_entries',CSK='cig_cost_entries';
const DKO=['일','월','화','수','목','금','토'];
const MKO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
let selType='cig',selCount=1,calYear,calMonth,selBrand='테리아';
const _n=new Date();calYear=_n.getFullYear();calMonth=_n.getMonth();
function load(){try{return JSON.parse(localStorage.getItem(SK)||'[]')}catch{return[]}}
function save(d){localStorage.setItem(SK,JSON.stringify(d))}
function loadCost(){try{return JSON.parse(localStorage.getItem(CSK)||'[]')}catch{return[]}}
function saveCost(d){localStorage.setItem(CSK,JSON.stringify(d))}
function pad(n){return String(n).padStart(2,'0')}
function getLocalDateKey(d){d=d||new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function goPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  closeDetail();closeCostDetail();
  if(name==='record'){setNow()}
  if(name==='cost-record'){setCostDateNow();selectBrand('테리아')}
  if(name==='calendar'){renderCalendar();renderStats();updateCalEyebrow()}
  if(name==='cost'){renderCostCalendar();renderCostList();updateCostEyebrow()}
}
function setNow(){const n=new Date();document.getElementById('input-date').value=n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate())}
setNow();
function updateTodayLabel(){const n=new Date();const el=document.getElementById('today-label');if(el)el.textContent=n.getFullYear()+'년 '+MKO[n.getMonth()]+' '+n.getDate()+'일 '+DKO[n.getDay()]+'요일'}
updateTodayLabel();setInterval(updateTodayLabel,60000);
function onCountInput(el){let v=parseInt(el.value);if(isNaN(v)||v<1)v=1;if(v>99)v=99;selCount=v;el.value=v;updateAddBtn()}
function stepCount(delta){const el=document.getElementById('count-input');let v=Math.max(1,Math.min(99,(parseInt(el.value)||1)+delta));el.value=v;selCount=v;updateAddBtn()}
function selectType(t){selType=t;document.getElementById('btn-cig').className='tbtn2'+(t==='cig'?' ac':'');document.getElementById('btn-trad').className='tbtn2'+(t==='trad'?' at':'');updateAddBtn()}
function updateAddBtn(){const btn=document.getElementById('add-btn');btn.textContent=(selType==='cig'?'테리아':'말보루')+' '+selCount+'개비 기록';btn.className='rbtn '+selType}
function addEntry(){const dateVal=document.getElementById('input-date').value;if(!dateVal){showToast('날짜를 입력해주세요');return}const entry={id:Date.now(),ts:dateVal,type:selType,count:selCount,dateKey:dateVal};const data=load();data.push(entry);save(data);showToast((selType==='cig'?'🔵 테리아':'🟤 말보루')+' '+selCount+'개비 기록됐어요')}
function deleteEntry(id){save(load().filter(e=>e.id!==id));renderCalendar();renderStats();const panel=document.getElementById('detail-panel');if(panel.classList.contains('open'))openDetail(panel.dataset.dk,panel.dataset.day)}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function updateCalEyebrow(){document.querySelector('#page-calendar .eyebrow').textContent=calYear+'년 '+MKO[calMonth]}
function updateCostEyebrow(){document.querySelector('#page-cost .eyebrow').textContent=costCalYear+'년 '+MKO[costCalMonth]}
function changeMonth(delta){calMonth+=delta;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderCalendar();renderStats();updateCalEyebrow()}
function getDateKey(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d)}
function renderCalendar(){
  document.getElementById('cal-month-label').textContent=calYear+'년 '+MKO[calMonth];
  const data=load(),map={};
  data.forEach(e=>{if(!map[e.dateKey])map[e.dateKey]={cig:0,trad:0};map[e.dateKey][e.type]+=e.count});
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const firstDayMon=(firstDay===0?6:firstDay-1);
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const todayKey=getLocalDateKey();
  const total=firstDayMon+dim;const cells=total%7===0?total:total+(7-total%7);
  for(let i=0;i<cells;i++){
    const cell=document.createElement('div');cell.className='calday';
    let dayNum,dk,isOther=false;
    if(i<firstDayMon){dayNum=prevDays-firstDayMon+i+1;const pm=calMonth===0?11:calMonth-1;const py=calMonth===0?calYear-1:calYear;dk=getDateKey(py,pm,dayNum);isOther=true}
    else if(i>=firstDayMon+dim){dayNum=i-firstDayMon-dim+1;const nm=calMonth===11?0:calMonth+1;const ny=calMonth===11?calYear+1:calYear;dk=getDateKey(ny,nm,dayNum);isOther=true}
    else{dayNum=i-firstDayMon+1;dk=getDateKey(calYear,calMonth,dayNum)}
    if(isOther)cell.classList.add('other');
    if(dk===todayKey)cell.classList.add('today');
    const numEl=document.createElement('div');numEl.className='cdn';numEl.textContent=dayNum;cell.appendChild(numEl);
    if(map[dk]){const badges=document.createElement('div');badges.className='badges';if(map[dk].cig>0){const b=document.createElement('span');b.className='badge cig';b.textContent=map[dk].cig;badges.appendChild(b)}if(map[dk].trad>0){const b=document.createElement('span');b.className='badge trad';b.textContent=map[dk].trad;badges.appendChild(b)}cell.appendChild(badges)}
    const capDk=dk,capDay=dayNum;cell.onclick=()=>openDetail(capDk,capDay);grid.appendChild(cell);
  }
}
function openDetail(dk,dayNum){
  const panel=document.getElementById('detail-panel');
  if(panel.classList.contains('open')&&panel.dataset.dk===dk){closeDetail();return}
  const data=load();const entries=data.filter(e=>e.dateKey===dk);
  const [y,m]=dk.split('-').map(Number);
  document.getElementById('detail-date-label').textContent=y+'년 '+MKO[m-1]+' '+dayNum+'일';
  panel.dataset.dk=dk;panel.dataset.day=dayNum;
  const list=document.getElementById('detail-list');list.innerHTML='';
  if(!entries.length){
    const em=document.createElement('div');em.className='detempty';em.textContent='이날 기록이 없어요';list.appendChild(em);
  } else {
    const cigTotal=entries.filter(e=>e.type==='cig').reduce((a,e)=>a+e.count,0);
    const tradTotal=entries.filter(e=>e.type==='trad').reduce((a,e)=>a+e.count,0);
    [['cig',cigTotal],['trad',tradTotal]].forEach(([type,total])=>{
      if(!total)return;
      const item=document.createElement('div');item.className='detitem '+type;
      const typeEl=document.createElement('span');typeEl.className='dtype';
      typeEl.textContent=type==='cig'?'🔵 테리아':'🟤 말보루';
      const cntEl=document.createElement('span');cntEl.className='dcnt';
      cntEl.textContent=total+'개비';
      item.appendChild(typeEl);item.appendChild(cntEl);
      list.appendChild(item);
    });
  }
  panel.classList.add('open');panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeDetail(){document.getElementById('detail-panel').classList.remove('open')}
function renderStats(){
  const data=load(),todayKey=getLocalDateKey();
  // 오늘은 항상 실제 오늘 기준
  const todayE=data.filter(e=>e.dateKey===todayKey);
  document.getElementById('s-today-cig').textContent=todayE.filter(e=>e.type==='cig').reduce((a,e)=>a+e.count,0);
  document.getElementById('s-today-trad').textContent=todayE.filter(e=>e.type==='trad').reduce((a,e)=>a+e.count,0);
  // 월 총합/최대는 캘린더 월 기준
  const mP=calYear+'-'+pad(calMonth+1);const mE=data.filter(e=>e.dateKey.startsWith(mP));
  document.getElementById('s-month-cig').textContent=mE.filter(e=>e.type==='cig').reduce((a,e)=>a+e.count,0);
  document.getElementById('s-month-trad').textContent=mE.filter(e=>e.type==='trad').reduce((a,e)=>a+e.count,0);
  const dm={};mE.forEach(e=>{dm[e.dateKey]=(dm[e.dateKey]||0)+e.count});
  const maxDate=Object.keys(dm).sort((a,b)=>dm[b]-dm[a])[0];
  const maxEl=document.getElementById('s-max-date');
  const maxSub=document.getElementById('s-max-sub');
  if(maxDate){const [y,mo,d]=maxDate.split('-').map(Number);maxEl.textContent=MKO[mo-1]+' '+d+'일';maxSub.textContent=dm[maxDate]+'개비'}
  else{maxEl.textContent='-';maxSub.textContent=''}
}
function scheduleNextRefresh(){const n=new Date();const ms=new Date(n.getFullYear(),n.getMonth(),n.getDate()+1)-n;setTimeout(()=>{renderCalendar();renderStats();updateTodayLabel();scheduleNextRefresh()},ms+100)}
scheduleNextRefresh();
document.addEventListener('visibilitychange',()=>{if(!document.hidden){renderCalendar();renderStats()}});
function selectBrand(brand){
  selBrand=brand;
  const tBtn=document.getElementById('brand-terea');const mBtn=document.getElementById('brand-marlboro');
  const base='flex:1;padding:12px 10px;border-radius:10px;font-family:var(--fp);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;';
  if(brand==='테리아'){tBtn.style.cssText=base+'border:1px solid var(--cig-light);background:var(--cig-dim);color:var(--cig-light)';mBtn.style.cssText=base+'border:1px solid rgba(255,255,255,0.06);background:#282828;color:#606060'}
  else{mBtn.style.cssText=base+'border:1px solid var(--trad-light);background:var(--trad-dim);color:var(--trad-light)';tBtn.style.cssText=base+'border:1px solid rgba(255,255,255,0.06);background:#282828;color:#606060'}
}
function setCostDateNow(){const n=new Date();const el=document.getElementById('cost-date');if(el)el.value=n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate())}
function addCost(){
  const dateVal=document.getElementById('cost-date').value;const amount=parseInt(document.getElementById('cost-amount').value);
  if(!dateVal){showToast('날짜를 입력해주세요');return}if(!amount||amount<=0){showToast('금액을 입력해주세요');return}
  const entry={id:Date.now(),dateKey:dateVal,amount,brand:selBrand};const data=loadCost();data.push(entry);saveCost(data);
  document.getElementById('cost-amount').value='';showToast('💰 '+amount.toLocaleString()+'원 기록됐어요');renderCostList();
}
function deleteCost(id){saveCost(loadCost().filter(e=>e.id!==id));renderCostList()}
function renderCostList(){
  const PR={'테리아':4800,'말보루':4500};const data=loadCost();
  const mP=costCalYear+'-'+pad(costCalMonth+1);
  const mD=data.filter(e=>e.dateKey.startsWith(mP)).sort((a,b)=>b.dateKey.localeCompare(a.dateKey));
  const tot=mD.reduce((a,e)=>a+e.amount,0);
  const tT=mD.filter(e=>e.brand==='테리아').reduce((a,e)=>a+e.amount,0);
  const mT=mD.filter(e=>e.brand==='말보루').reduce((a,e)=>a+e.amount,0);
  const tPk=Math.round(tT/PR['테리아']*10)/10;const mPk=Math.round(mT/PR['말보루']*10)/10;
  const totPk=Math.round((tT/PR['테리아']+mT/PR['말보루'])*10)/10;
  const $=id=>document.getElementById(id);
  if($('cost-month-total')){$('cost-month-total').textContent=tot.toLocaleString()+'원 ('+totPk+'갑)'}
  if($('cost-terea-total'))$('cost-terea-total').textContent=tT.toLocaleString()+'원 ('+tPk+'갑)';
  if($('cost-marlboro-total'))$('cost-marlboro-total').textContent=mT.toLocaleString()+'원 ('+mPk+'갑)';
}
// 비용 캘린더
let costCalYear=new Date().getFullYear(),costCalMonth=new Date().getMonth();
function changeCostMonth(delta){costCalMonth+=delta;if(costCalMonth>11){costCalMonth=0;costCalYear++}if(costCalMonth<0){costCalMonth=11;costCalYear--}renderCostCalendar();renderCostList();updateCostEyebrow()}
function renderCostCalendar(){
  document.getElementById('cost-cal-month-label').textContent=costCalYear+'년 '+MKO[costCalMonth];
  const data=loadCost(),map={};
  data.forEach(e=>{if(!map[e.dateKey])map[e.dateKey]={total:0,items:[]};map[e.dateKey].total+=e.amount;map[e.dateKey].items.push(e)});
  const grid=document.getElementById('cost-cal-grid');grid.innerHTML='';
  const firstDay=new Date(costCalYear,costCalMonth,1).getDay();
  const firstDayMon=(firstDay===0?6:firstDay-1);
  const dim=new Date(costCalYear,costCalMonth+1,0).getDate();
  const prevDays=new Date(costCalYear,costCalMonth,0).getDate();
  const todayKey=getLocalDateKey();
  const total=firstDayMon+dim;const cells=total%7===0?total:total+(7-total%7);
  for(let i=0;i<cells;i++){
    const cell=document.createElement('div');cell.className='calday';
    let dayNum,dk,isOther=false;
    if(i<firstDayMon){dayNum=prevDays-firstDayMon+i+1;const pm=costCalMonth===0?11:costCalMonth-1;const py=costCalMonth===0?costCalYear-1:costCalYear;dk=getDateKey(py,pm,dayNum);isOther=true}
    else if(i>=firstDayMon+dim){dayNum=i-firstDayMon-dim+1;const nm=costCalMonth===11?0:costCalMonth+1;const ny=costCalMonth===11?costCalYear+1:costCalYear;dk=getDateKey(ny,nm,dayNum);isOther=true}
    else{dayNum=i-firstDayMon+1;dk=getDateKey(costCalYear,costCalMonth,dayNum)}
    if(isOther)cell.classList.add('other');
    if(dk===todayKey)cell.classList.add('today');
    const numEl=document.createElement('div');numEl.className='cdn';numEl.textContent=dayNum;cell.appendChild(numEl);
    if(map[dk]){
      const amtEl=document.createElement('div');
      amtEl.style.cssText='font-size:9px;font-weight:700;color:var(--gold);margin-top:1px';
      amtEl.textContent=(map[dk].total/1000).toFixed(0)+'k';
      cell.appendChild(amtEl);
    }
    const capDk=dk,capDay=dayNum;cell.onclick=()=>openCostDetail(capDk,capDay);grid.appendChild(cell);
  }
}
function openCostDetail(dk,dayNum){
  const panel=document.getElementById('cost-detail-panel');
  if(panel.classList.contains('open')&&panel.dataset.dk===dk){closeCostDetail();return}
  const data=loadCost();const entries=data.filter(e=>e.dateKey===dk).sort((a,b)=>b.id-a.id);
  const [y,m]=dk.split('-').map(Number);
  document.getElementById('cost-detail-date-label').textContent=y+'년 '+MKO[m-1]+' '+dayNum+'일';
  panel.dataset.dk=dk;panel.dataset.day=dayNum;
  const list=document.getElementById('cost-detail-list');list.innerHTML='';
  if(!entries.length){const em=document.createElement('div');em.className='detempty';em.textContent='이날 기록이 없어요';list.appendChild(em)}
  else{entries.forEach(e=>{
    const item=document.createElement('div');item.className='detitem cig';
    item.style.background=e.brand==='테리아'?'var(--cig-dim)':'var(--trad-dim)';
    const bEl=document.createElement('span');bEl.className='dtype';
    bEl.style.color=e.brand==='테리아'?'var(--cig-light)':'var(--trad-light)';
    bEl.textContent=(e.brand==='테리아'?'🔵 ':'🟤 ')+e.brand;
    const aInput=document.createElement('input');
    aInput.type='number';aInput.min='1';aInput.value=e.amount;aInput.inputMode='numeric';
    aInput.style.cssText='width:80px;height:28px;text-align:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:var(--text);font-family:var(--fp);font-size:13px;font-weight:700;color-scheme:dark';
    aInput.onchange=()=>{const v=Math.max(1,parseInt(aInput.value)||1);aInput.value=v;const all=loadCost();const idx=all.findIndex(x=>x.id===e.id);if(idx>-1){all[idx].amount=v;saveCost(all);renderCostCalendar();renderCostList()}};
    const unitEl=document.createElement('span');unitEl.style.cssText='font-size:11px;color:var(--text-muted)';unitEl.textContent='원';
    const delBtn=document.createElement('button');delBtn.className='ddel';delBtn.textContent='✕';
    delBtn.onclick=(ev)=>{ev.stopPropagation();deleteCost(e.id);openCostDetail(dk,dayNum)};
    item.appendChild(bEl);item.appendChild(aInput);item.appendChild(unitEl);item.appendChild(delBtn);list.appendChild(item);
  })}
  panel.classList.add('open');panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeCostDetail(){document.getElementById('cost-detail-panel').classList.remove('open')}

function exportData(){
  const data={smoking:load(),cost:loadCost(),exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date();
  a.href=url;a.download='haebojago_'+date.getFullYear()+pad(date.getMonth()+1)+pad(date.getDate())+'.json';
  a.click();URL.revokeObjectURL(url);
  showToast('✅ 백업 파일이 저장됐어요');
}
function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.smoking||!data.cost){showToast('❌ 올바른 백업 파일이 아니에요');return}
      if(!confirm('현재 데이터를 덮어쓸까요?\n기존 기록은 사라져요.')){return}
      save(data.smoking);saveCost(data.cost);
      showToast('✅ 데이터가 복원됐어요');
      renderCalendar();renderStats();renderCostCalendar();renderCostList();
    }catch{showToast('❌ 파일을 읽는 중 오류가 발생했어요')}
  };
  reader.readAsText(file);
  event.target.value='';
}
updateAddBtn();
</script>
